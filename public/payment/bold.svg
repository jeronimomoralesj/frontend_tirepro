  -->
  <text
    x="6" y="21"
    font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="22"
    fill="#0A0A0A"
    letter-spacing="-1.2"
  >bold<tspan fill="#FF3D6E">·</tspan></text>
</svg>
