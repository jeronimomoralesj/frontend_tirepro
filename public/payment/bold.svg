<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 28" role="img" aria-label="Bold">
  <!--
    Inline placeholder wordmark, sized to the same 90×28 box every other
    badge in /public/payment/ uses. Bold's own brand assets aren't
    distributed as a standalone download — their UI kit ships them via
